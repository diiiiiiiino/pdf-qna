plugins {
    id 'java'
    id 'application'
}

group = 'pdfqna'
version = '1.0-SNAPSHOT'

java {
    sourceCompatibility = JavaVersion.VERSION_11
    targetCompatibility = JavaVersion.VERSION_11
}

repositories {
    mavenCentral()
    maven {
        url 'https://artifactory.openpreservation.org/artifactory/vera-dev'
    }
}

dependencies {
    implementation 'org.opendataloader:opendataloader-pdf-core:1.11.0'
    implementation 'io.javalin:javalin:5.6.5'
    implementation 'org.slf4j:slf4j-simple:2.0.9'
    implementation 'com.google.code.gson:gson:2.10.1'
}

application {
    mainClass = 'pdfqna.ExtractPdf'
}

task web(type: JavaExec) {
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'pdfqna.WebServer'
}
